name: release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Build wheel + sdist
        run: |
          python -m pip install --upgrade pip build
          python -m build

      - name: Verify version matches tag
        run: |
          TAG_VER="${GITHUB_REF##*/v}"
          PKG_VER="$(python -c 'import tomllib; print(tomllib.load(open("pyproject.toml","rb"))["project"]["version"])')"
          if [ "$TAG_VER" != "$PKG_VER" ]; then
            echo "::error::tag v$TAG_VER does not match pyproject version $PKG_VER"
            exit 1
          fi

      - name: Generate release notes
        id: notes
        run: |
          PREV_TAG="$(git describe --tags --abbrev=0 HEAD^ 2>/dev/null || echo '')"
          if [ -n "$PREV_TAG" ]; then
            git log --pretty=format:'- %s' "$PREV_TAG"..HEAD > /tmp/notes.md
          else
            git log --pretty=format:'- %s' > /tmp/notes.md
          fi
          echo "notes_path=/tmp/notes.md" >> "$GITHUB_OUTPUT"

      - uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          body_path: ${{ steps.notes.outputs.notes_path }}
          generate_release_notes: false
          fail_on_unmatched_files: true
